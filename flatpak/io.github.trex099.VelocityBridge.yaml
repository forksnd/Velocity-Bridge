app-id: io.github.trex099.VelocityBridge
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: velocity-bridge

finish-args:
  # Network access for clipboard sync server
  - --share=network
  # Wayland clipboard access
  - --socket=wayland
  # X11 fallback and clipboard
  - --socket=x11
  - --share=ipc
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # System tray (AppIndicator/StatusNotifier)
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.portal.Notification
  # Sound for notifications
  - --socket=pulseaudio
  # Access Downloads folder for image uploads
  - --filesystem=xdg-download
  # Config and data directories
  - --filesystem=~/.config/velocity-bridge:create
  - --filesystem=~/.local/share/velocity-bridge:create
  # GPU acceleration for WebKitGTK
  - --device=dri

modules:
  # Main Tauri application (from AppImage)
  - name: velocity-bridge
    buildsystem: simple
    build-commands:
      # Extract AppImage
      - chmod +x Velocity-Bridge_3.0.0_amd64.AppImage
      - ./Velocity-Bridge_3.0.0_amd64.AppImage --appimage-extract
      
      # Install binary only - DO NOT copy bundled libs (fixes OpenSSL mismatch)
      - install -Dm755 squashfs-root/usr/bin/velocity-bridge /app/bin/velocity-bridge
      
      # Install desktop file
      - install -Dm644 io.github.trex099.VelocityBridge.desktop /app/share/applications/io.github.trex099.VelocityBridge.desktop
      
      # Install icon
      - install -Dm644 velocity-icon.png /app/share/icons/hicolor/256x256/apps/io.github.trex099.VelocityBridge.png
      
      # Install metainfo
      - install -Dm644 io.github.trex099.VelocityBridge.metainfo.xml /app/share/metainfo/io.github.trex099.VelocityBridge.metainfo.xml
    
    sources:
      # AppImage from GitHub Release
      - type: file
        url: https://github.com/Trex099/Velocity-Bridge/releases/download/v3.0.0/Velocity-Bridge_3.0.0_amd64.AppImage
        sha256: 3937bff737919e3590f312633c6c7a780b76484d744bca347020b70f5c38079d
        dest-filename: Velocity-Bridge_3.0.0_amd64.AppImage
      
      # Desktop file
      - type: file
        path: io.github.trex099.VelocityBridge.desktop
      
      # Icon
      - type: file
        url: https://raw.githubusercontent.com/Trex099/Velocity-Bridge/main/assets/velocity-icon.png
        sha256: 2d8d8b52919fb5970a1a208d363c5d83310ec521a7adad897984a4741f70e37c
        dest-filename: velocity-icon.png
      
      # Metainfo
      - type: file
        path: io.github.trex099.VelocityBridge.metainfo.xml
