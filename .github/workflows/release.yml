name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================
  # LINUX BUILD
  # ============================================
  release-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri v2 dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - name: Install Python dependencies
        run: pip install -r Velocity_GUI/src-python/requirements.txt pyinstaller

      - name: Build Linux Backend
        run: |
          pyinstaller --onefile --name velocity-backend \
            --hidden-import=uvicorn.logging \
            --hidden-import=uvicorn.loops \
            --hidden-import=uvicorn.loops.auto \
            --hidden-import=uvicorn.protocols \
            --hidden-import=uvicorn.protocols.http \
            --hidden-import=uvicorn.protocols.http.auto \
            --hidden-import=uvicorn.lifespan.on \
            Velocity_GUI/src-python/server.py
          echo "=== PyInstaller output ==="
          ls -la dist/

      - name: Prepare sidecar binary
        run: |
          echo "=== Checking PyInstaller output ==="
          ls -la dist/
          
          echo "=== Creating binaries directory ==="
          mkdir -p Velocity_GUI/src-tauri/binaries
          
          echo "=== Copying binary ==="
          cp dist/velocity-backend Velocity_GUI/src-tauri/binaries/velocity-backend-x86_64-unknown-linux-gnu
          
          echo "=== Setting executable permission ==="
          chmod +x Velocity_GUI/src-tauri/binaries/velocity-backend-x86_64-unknown-linux-gnu
          
          echo "=== Verifying binary exists ==="
          ls -la Velocity_GUI/src-tauri/binaries/
          test -f Velocity_GUI/src-tauri/binaries/velocity-backend-x86_64-unknown-linux-gnu || exit 1

      - name: Install frontend dependencies
        working-directory: Velocity_GUI
        run: npm install

      - name: Build Tauri (deb, rpm, appimage)
        working-directory: Velocity_GUI
        run: npm run tauri build -- --bundles deb,rpm,appimage

      - name: List bundle output
        run: |
          echo "=== DEB ==="
          ls -la Velocity_GUI/src-tauri/target/release/bundle/deb/ || true
          echo "=== RPM ==="
          ls -la Velocity_GUI/src-tauri/target/release/bundle/rpm/ || true
          echo "=== APPIMAGE ==="
          ls -la Velocity_GUI/src-tauri/target/release/bundle/appimage/ || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Velocity_GUI/src-tauri/target/release/bundle/deb/*.deb
            Velocity_GUI/src-tauri/target/release/bundle/rpm/*.rpm
            Velocity_GUI/src-tauri/target/release/bundle/appimage/*.AppImage

  # ============================================
  # WINDOWS BUILD
  # ============================================
  release-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install -r src-python-windows/requirements.txt

      - name: Build Windows Backend
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed \
            --name velocity-backend \
            --hidden-import=uvicorn.logging \
            --hidden-import=uvicorn.loops \
            --hidden-import=uvicorn.loops.auto \
            --hidden-import=uvicorn.protocols \
            --hidden-import=uvicorn.protocols.http \
            --hidden-import=uvicorn.protocols.http.auto \
            --hidden-import=uvicorn.lifespan.on \
            src-python-windows/server.py
          echo "=== PyInstaller output ==="
          ls -la dist/

      - name: Install frontend dependencies
        working-directory: Velocity_GUI
        run: npm install

      - name: Prepare Windows sidecar binary
        shell: bash
        run: |
          echo "=== Checking dist folder ==="
          ls -la dist/
          echo "=== Creating binaries folder ==="
          mkdir -p Velocity_GUI/src-tauri/binaries
          echo "=== Copying binary ==="
          cp dist/velocity-backend.exe Velocity_GUI/src-tauri/binaries/velocity-backend-x86_64-pc-windows-msvc.exe
          echo "=== Verifying ==="
          ls -la Velocity_GUI/src-tauri/binaries/

      - name: Build and bundle
        working-directory: Velocity_GUI
        shell: cmd
        run: |
          dir src-tauri\binaries
          npm run tauri build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Velocity_GUI/src-tauri/target/release/bundle/msi/*.msi
            Velocity_GUI/src-tauri/target/release/bundle/nsis/*.exe
