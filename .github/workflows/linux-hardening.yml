name: Linux Hardening Checks

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  signing-hygiene:
    name: Signing Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify signing material hygiene
        run: ./scripts/ci/check_signing_hygiene.sh

  linux-validation:
    name: Linux Validation
    runs-on: ubuntu-latest
    needs: signing-hygiene
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r Velocity_GUI/src-python/requirements.txt

      - name: Run backend tests
        working-directory: Velocity_GUI/src-python
        run: python -m pytest -q

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo check
        working-directory: Velocity_GUI/src-tauri
        run: cargo check

      - name: Cargo clippy
        working-directory: Velocity_GUI/src-tauri
        run: cargo clippy -- -D warnings

      - name: Cargo tests
        working-directory: Velocity_GUI/src-tauri
        run: cargo test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Velocity_GUI/package-lock.json

      - name: Install frontend dependencies
        working-directory: Velocity_GUI
        run: npm ci

      - name: Frontend compile and build
        working-directory: Velocity_GUI
        run: npm run build:web
